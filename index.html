<!DOCTYPE html>
<html lang="he">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Pro Futures Risk Calculator</title>

<link href="https://fonts.googleapis.com/css2?family=Heebo:wght@300;400;600&display=swap" rel="stylesheet">

<style>

:root{
--burgundy:#5a0f1a;
--burgundy-soft:#7a1b2a;
--silver:#cfcfcf;
--gray:#2b2b2f;
--black:#0d0d0f;
--white:#ffffff;
}

body{
margin:0;
font-family:'Heebo',sans-serif;
background:linear-gradient(140deg,#0d0d0f,#1c1c20);
display:flex;
justify-content:center;
align-items:center;
min-height:100vh;
color:var(--silver);
}

.container{
background:linear-gradient(145deg,#141416,#1e1e22);
padding:40px;
width:100%;
max-width:460px;
border-radius:20px;
border:1px solid rgba(255,255,255,0.06);
box-shadow:0 0 40px rgba(122,27,42,0.3);
}

h2{
text-align:center;
font-weight:300;
color:white;
margin-bottom:28px;
}

input{
width:100%;
padding:14px;
margin-bottom:16px;
border-radius:12px;
border:none;
background:var(--gray);
color:white;
font-size:15px;
}

button{
width:100%;
padding:14px;
border-radius:12px;
border:none;
font-size:15px;
background:linear-gradient(90deg,var(--burgundy),var(--burgundy-soft));
color:white;
cursor:pointer;
}

.results{
margin-top:25px;
padding-top:20px;
border-top:1px solid rgba(255,255,255,0.06);
display:none;
}

.result-item{
margin-bottom:10px;
font-size:14px;
}

.highlight{
color:white;
font-weight:600;
}

</style>
</head>

<body>

<div class="container">

<h2>Futures Risk Calculator</h2>

<input type="number" id="account" placeholder="גודל תיק (USDT)">
<input type="number" id="risk" placeholder="אחוז סיכון מהתיק (%)">
<input type="number" id="stop" placeholder="אחוז סטופ מהכניסה (%)">
<input type="number" id="tp" placeholder="אחוז טייק פרופיט (%)">

<button onclick="calculate()">CALCULATE</button>

<div class="results" id="results">

<div class="result-item" id="riskAmount"></div>
<div class="result-item" id="margin"></div>
<div class="result-item" id="leverage"></div>
<div class="result-item" id="positionSize"></div>

<div class="result-item highlight" id="rr"></div>
<div class="result-item" id="profitAmount"></div>
<div class="result-item" id="breakeven"></div>

</div>
</div>

<script>

function calculate(){

const account = parseFloat(document.getElementById("account").value);
const riskPercent = parseFloat(document.getElementById("risk").value)/100;
const stopPercent = parseFloat(document.getElementById("stop").value)/100;
const tpPercentInput = parseFloat(document.getElementById("tp").value);
const tpPercent = tpPercentInput/100;

if(!account || !riskPercent || !stopPercent || !tpPercent){
alert("מלא את כל השדות");
return;
}

const riskAmount = account * riskPercent;

/* פוזיציה דרושה לפי הסטופ */
const positionSize = riskAmount / stopPercent;

/* מינוף מקסימלי */
const maxLeverage = 44;

/* מינימום מרג'ין */
const preferredMargin = account * 0.33;

/* מרג'ין מינימלי כדי לא לעבור מינוף 44 */
const marginNeeded = positionSize / maxLeverage;

/* בחירת מרג'ין */
let margin = Math.max(preferredMargin, marginNeeded);

/* מינוף בפועל */
let leverage = positionSize / margin;

/* עיגול מינוף */
leverage = Math.floor(leverage);

const finalPosition = margin * leverage;

/* רווח פוטנציאלי */
const profitAmount = finalPosition * tpPercent;

/* Risk Reward */
const rrRatio = tpPercentInput / (stopPercent*100);

/* Winrate */
const breakeven = 100 / (1 + rrRatio);

document.getElementById("riskAmount").innerHTML =
"Risk Amount: " + riskAmount.toFixed(2) + " USDT";

document.getElementById("margin").innerHTML =
"Margin Used: " + margin.toFixed(2) + " USDT";

document.getElementById("leverage").innerHTML =
"Leverage: x" + leverage;

document.getElementById("positionSize").innerHTML =
"Position Size: " + finalPosition.toFixed(2) + " USDT";

document.getElementById("rr").innerHTML =
"Risk / Reward: 1 : " + rrRatio.toFixed(2);

document.getElementById("profitAmount").innerHTML =
"Potential Profit: " + profitAmount.toFixed(2) + " USDT";

document.getElementById("breakeven").innerHTML =
"Break Even Win Rate: " + breakeven.toFixed(2) + "%";

document.getElementById("results").style.display="block";

}

</script>

</body>
</html>
